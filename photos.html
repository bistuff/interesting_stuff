<h1>Random Pexels Photo (every 2 seconds)</h1>
    <!-- Image display -->
    <img id="randomPhoto" src="" alt="Random Pexels Photo" />

    <!-- Attribution -->
    <p id="attribution"></p>

    <script>
        const apiKey = "YOUR_PEXELS_API_KEY"; // ← Replace this with your API key
        const photoElement = document.getElementById("randomPhoto");
        const attributionElement = document.getElementById("attribution");

        async function fetchRandomPhoto() {
            try {
                // Fetch curated photos
                const response = await fetch("https://api.pexels.com/v1/curated?per_page=1", {
                    headers: {
                        Authorization: apiKey
                    }
                });

                const data = await response.json();
                if (data.photos && data.photos.length > 0) {
                    const photo = data.photos[0];
                    photoElement.src = photo.src.large;
                    attributionElement.innerHTML = 
                        `Photo by <a href="${photo.photographer_url}" target="_blank">${photo.photographer}</a> on <a href="https://www.pexels.com" target="_blank">Pexels</a>`;
                }
            } catch (error) {
                console.error("Error fetching Pexels photo:", error);
            }
        }

        // Fetch new photo every 2 seconds
        setInterval(fetchRandomPhoto, 2000);
        fetchRandomPhoto();
    </script>
