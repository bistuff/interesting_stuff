<h1>Random Image Feed (every 2 seconds)</h1>
<img id="randomPhoto" src="" alt="Random Image" />

<script>
const photoElement = document.getElementById("randomPhoto");

function showRandomPhoto() {
    // picsum.photos random image URL
    const width = 250px;
    const height = 400px;
    const url = `https://picsum.photos/${width}/${height}?random=${Math.floor(Math.random()*1000)}`;
    photoElement.src = url;
}

// Update image every 2 seconds
setInterval(showRandomPhoto, 2000);
showRandomPhoto();
</script>
