<!DOCTYPE html>
<html>
  <head>
    <title>Interesting Stuff</title>

  <body>
            <h1 class="title" >Main</h1>
      <div>
    <h2>MENU</h2>
    <a class="menu" href="index.html">Main</a>
    <a class="menu" href="photos.html">Photos</a>
<a class="menu" href="drawing.html">Drawing</a>
<a class="menu" href="calculator.html">Calculator</a>
    </div>
<input type="color" id="color">
<button onclick="saveDrawing()">Save Drawing</button>
<canvas id="board" width="350" height="400" style="border:1px solid black;"></canvas>

<script>
function saveDrawing(){
  let canvas = document.getElementById("board");
  let link = document.createElement("a");

  link.download = "drawing.png";
  link.href = canvas.toDataURL();

  link.click();
}
let colorPicker = document.getElementById("color");

colorPicker.addEventListener("input", function(){
  ctx.strokeStyle = this.value;
});
let canvas = document.getElementById("board");
let ctx = canvas.getContext("2d");

let drawing = false;

function start(e){
  drawing = true;
  draw(e);
}

function end(){
  drawing = false;
  ctx.beginPath();
}

function draw(e){
  if(!drawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  ctx.lineTo(x,y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y);
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", end);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", end);
canvas.addEventListener("touchmove", draw);
</script>

  </body>
</html>
